            background: #0d0d0d;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 900px;
            width: 90%;
            padding: 40px 20px;
        }

        /* HERO */

        .hero {
            background: #1a1a1a;
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
        }

        .hero h1 {

            font-size: 2.5rem;
        }

        .hero p {
            opacity: 0.7;
        }

        /* LINK BOXEN */

        .links {
            display: grid;
            gap: 12px;
        }

        .link-box {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            color: white;
            transition: 0.2s;
        }

        .link-box:hover {
            transform: scale(1.03);
            background: #262626;
        }

        .icon {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon img {
            width: 24px;
            height: 24px;
            object-fit: contain;
            display: block;
            border-radius: 6px;
        }

        /* FOOTER */

        .footer {
            margin-top: 40px;
            opacity: 0.5;
            font-size: 0.9rem;
        }
